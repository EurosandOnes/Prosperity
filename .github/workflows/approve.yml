name: Approve Roles

on:
  workflow_dispatch:
    inputs:
      hashes:
        description: 'Enter "all" to approve everything, or paste comma-separated hashes'
        required: true
        default: 'all'
  repository_dispatch:
    types: [approve_roles]

permissions:
  contents: write

jobs:
  approve:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Process approvals
        run: |
          # Handle both manual (workflow_dispatch) and API (repository_dispatch) triggers
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            APPROVED="${{ github.event.client_payload.approved }}"
            REJECTED="${{ github.event.client_payload.rejected }}"
            DECISIONS='${{ github.event.client_payload.decisions }}'
            
            # Save decision history for learning engine
            if [ "$DECISIONS" != "" ] && [ "$DECISIONS" != "null" ]; then
              echo "$DECISIONS" > public/data/latest_decisions.json
            fi
            
            # Process approved
            if [ "$APPROVED" != "none" ] && [ "$APPROVED" != "" ]; then
              python pipeline/approve_roles.py --approve $(echo "$APPROVED" | tr ',' ' ')
            fi
            
            # Process rejected
            if [ "$REJECTED" != "none" ] && [ "$REJECTED" != "" ]; then
              python pipeline/approve_roles.py --reject $(echo "$REJECTED" | tr ',' ' ')
            fi
          else
            INPUT="${{ github.event.inputs.hashes }}"
            if [ "$INPUT" = "all" ]; then
              python pipeline/approve_roles.py --approve-all
            else
              python pipeline/approve_roles.py --approve $(echo "$INPUT" | tr ',' ' ')
            fi
          fi

      - name: Commit approvals
        run: |
          git config user.name "prosperity-bot"
          git config user.email "bot@prosperity.dev"
          git add public/data/approved_roles.json public/data/latest_decisions.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "approve roles [$(date -u +%Y-%m-%dT%H:%M)]"
            git push --force
          fi
