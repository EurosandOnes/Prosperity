# .github/workflows/people.yml
# ─────────────────────────────────────────────
# Builds the people registry monthly.
# Scrapes fund team pages, extracts people via LLM,
# finds LinkedIn profiles via Google.
# ─────────────────────────────────────────────

name: Build People Registry

on:
  schedule:
    - cron: "0 4 1 * *"  # 1st of every month at 04:00 UTC
  workflow_dispatch: {}   # Manual trigger

permissions:
  contents: write

jobs:
  build-people:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Build people registry
        env:
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REGISTRY_FILE: ./public/data/funds_registry.json
          PEOPLE_OUTPUT_DIR: ./public/data
        run: python pipeline/people_registry.py

      - name: Commit people registry
        run: |
          git config user.name "prosperity-bot"
          git config user.email "bot@prosperity.dev"
          git add public/data/people_registry.json
          if git diff --staged --quiet; then
            echo "No changes to people registry"
          else
            git commit -m "data: update people registry [$(date -u +%Y-%m-%d)]"
            git push
          fi
